<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Регистрация — Магазин цветов</title>
    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./registration.css" />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Lato:wght@300;400;700&display=swap" />
    <style>
      .nav-back-link {
        position: fixed;
        top: 30px;
        left: 30px;
        z-index: 1000;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 12px 20px;
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(10px);
        -webkit-backdrop-filter: blur(10px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        border-radius: 50px;
        text-decoration: none;
        color: white;
        font-family: 'Lato', sans-serif;
        font-weight: 700;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 1px;
        transition: all 0.3s ease;
      }
      .nav-back-link:hover {
        background: rgba(255, 255, 255, 0.3);
        transform: translateX(-5px);
      }
    </style>
  </head>
  <body>
    
    <a href="main.html" class="nav-back-link">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <line x1="19" y1="12" x2="5" y2="12"></line>
        <polyline points="12 19 5 12 12 5"></polyline>
      </svg>
      <span>На главную</span>
    </a>

    <div class="auth-page">
      
      <div class="background-container">
        <img class="bg-main" src="./public/3028c897d22592831a12a2647aa6537d-1@2x.png" alt="" />
        <img class="bg-logo" src="./public/f11c56f0-dffe-42b3-a3c1-0b664d5c0c92-21@2x.png" alt="" />
      </div>

      <div class="spacer-side"></div>

      <main class="form-side">
        <div class="glass-panel">
          <div class="header-area">
            <h1 class="h1">Регистрация</h1>
            <p class="subtitle">Создайте аккаунт, чтобы сохранять любимые букеты</p>
          </div>

          <form class="auth-form">
            <div class="input-block">
              <label>E-mail</label>
              <input type="email" placeholder="Введите ваш e-mail" required />
            </div>

            <div class="input-block">
              <label>Пароль</label>
              <input type="password" placeholder="Придумайте пароль" required />
            </div>

            <div class="input-block">
              <label>Повторите пароль</label>
              <input type="password" placeholder="Введите пароль еще раз" required />
            </div>

            <div class="form-options">
              <label class="remember-me">
                <input type="checkbox" />
                <span>Запомнить меня</span>
              </label>
            </div>

            <button type="submit" class="login-btn">Зарегистрироваться</button>

            <div class="signup-link">
              <span>Уже есть аккаунт?</span>
              <a href="login.html">Войти</a>
            </div>
          </form>
        </div>
      </main>

    </div>
  </body>
</html>
