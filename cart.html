<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Корзина</title>

    <link rel="stylesheet" href="./global.css" />
    <link rel="stylesheet" href="./cart.css" />

    <style>
        .nav-buttons-wrapper {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;

            padding: 14px 28px;

            background: linear-gradient(135deg, #ffb6c1, #f48fb1);
            color: white;

            text-decoration: none;
            font-family: sans-serif;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: 1px;
            text-transform: uppercase;

            border-radius: 50px;

            box-shadow: 0 6px 18px rgba(244, 143, 177, 0.4);

            transition: 0.3s ease;
        }

        .nav-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(244, 143, 177, 0.5);
        }

        .nav-btn:active {
            transform: translateY(0);
        }
    </style>
</head>

<body>
    <main class="cart-page-container">

        <header class="cart-header-section">

            <div class="nav-buttons-wrapper">
                <a href="index.html" class="nav-btn">← НА ГЛАВНУЮ</a>
                <a href="catalog.html" class="nav-btn">🏠 В КАТАЛОГ</a>
            </div>

            <div class="logo-wrapper">
                <h1 class="cart-main-title">Ваша корзина</h1>
            </div>

        </header>

        <div class="cart-grid-layout">

            <section class="cart-items-column" id="cart-items-container"></section>

            <aside class="cart-summary-aside">
                <div class="summary-box">
                    <b class="summary-total-label" id="total-price-display">Итого: 0 ₸</b>
                    <div class="summary-items-list" id="summary-items-list"></div>
                    <button class="pay-all-button" onclick="alert('Спасибо!')">
                        Оплатить всё
                    </button>
                </div>
            </aside>

        </div>

    </main>

    <script src="js/cart.js"></script>
</body>
</html>
